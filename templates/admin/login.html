{% extends "admin/base.html" %}

{% block title %}Sign in — Lavora Clinic Admin{% endblock %}

{% block body %}
<div class="min-h-screen flex items-center justify-center px-4">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-lg p-8">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-emerald-100 rounded-2xl mb-4">
                <svg class="w-8 h-8 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-slate-900">Lavora Clinic</h1>
            <p class="text-slate-500 mt-1">Admin dashboard</p>
        </div>

        {% if error %}
        <div class="mb-4 px-4 py-3 bg-red-50 text-red-700 rounded-lg text-sm">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="{{ url_for('admin_login') }}" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                <input
                    type="password"
                    name="password"
                    required
                    autofocus
                    class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition"
                />
            </div>
            <button
                type="submit"
                class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-3 rounded-lg transition"
            >Sign in</button>
        </form>
    </div>
</div>
{% endblock %}
