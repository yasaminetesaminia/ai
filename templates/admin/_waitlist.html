<div class="flex items-center justify-between mb-4">
    <h2 class="text-lg font-semibold text-slate-900">Waitlist</h2>
    <span class="text-sm text-slate-500">{{ waitlist|length }} waiting</span>
</div>

{% if waitlist %}
<div class="overflow-x-auto">
<table class="min-w-full text-sm">
    <thead>
        <tr class="text-left text-xs text-slate-500 border-b border-slate-200">
            <th class="pb-2 font-medium">Client</th>
            <th class="pb-2 font-medium">Mobile</th>
            <th class="pb-2 font-medium">Wants</th>
            <th class="pb-2 font-medium">Date</th>
            <th class="pb-2 font-medium">Time</th>
        </tr>
    </thead>
    <tbody class="divide-y divide-slate-100">
        {% for w in waitlist %}
        <tr>
            <td class="py-2 text-slate-900 font-medium">{{ w.client_name }}</td>
            <td class="py-2 text-slate-500">{{ w.client_mobile }}</td>
            <td class="py-2 text-slate-700">{{ w.department_name }} / {{ w.sub_service }}</td>
            <td class="py-2 text-slate-500">{{ w.desired_date }}</td>
            <td class="py-2 text-slate-500">{{ w.desired_time }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
</div>
{% else %}
<div class="text-center py-6 text-slate-400">
    <p>Waitlist is empty</p>
</div>
{% endif %}
